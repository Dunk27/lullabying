<style>
/* Базовые настройки для Тильды */
#allrecords ul { padding: 0; margin: 0; }
#allrecords li { list-style: none; }

:root {
  --main-bg: #fdf6f0;
  --accent: #c97d8a;
  --text-dark: #2d1f23;
  --text-muted: #8a7070;
}

* { margin:0; padding:0; box-sizing:border-box }
html { scroll-behavior:smooth }
body { font-family:'DM Sans', Arial, sans-serif; background: var(--main-bg); color: var(--text-dark); overflow-x:hidden; line-height:1.6 }
h1,h2,h3,h4 { font-family:'Cormorant Garamond', serif; font-weight:400; line-height:1.1 }

/* NAV */
nav { position:fixed; top:0; left:0; right:0; z-index:9999; display:flex; align-items:center; justify-content:space-between; padding:20px 60px; transition:all .4s }
nav.scrolled { background:rgba(253,246,240,.95); backdrop-filter:blur(12px); box-shadow:0 2px 24px rgba(0,0,0,.07) }
.nav-logo { font-family:'Cormorant Garamond', serif; font-size:1.4rem; color:#fff; text-decoration:none; display:flex; align-items:center; gap:9px }
nav.scrolled .nav-logo { color: var(--text-dark) }
.nav-star { display:inline-block; font-size:1rem; color:#e8b4bf }
.nav-links { display:flex; gap:36px; list-style:none }
.nav-links a { text-decoration:none; font-size:.85rem; color:rgba(255,255,255,.85); transition:color .3s }
nav.scrolled .nav-links a { color: var(--text-muted) }

/* HERO С ВИДЕО-ФОНОМ */
.hero { position:relative; height:100vh; display:flex; align-items:center; overflow:hidden; background:#2a1820 }
.hero-video-container { position:absolute; inset:0; width:100%; height:100%; z-index:1 }
.hero-video-container video { width:100%; height:100%; object-fit:cover; opacity:0.5 }
.hero-overlay { position:absolute; inset:0; background:linear-gradient(135deg,rgba(90,28,45,.8) 0%,rgba(45,24,32,.55) 60%,rgba(0,0,0,.2) 100%); z-index:2 }
.hero-content { position:relative; z-index:10; padding:0 70px; max-width:750px; animation:fadeUp 1.2s ease-out both }

@keyframes fadeUp { from{opacity:0; transform:translateY(40px)} to{opacity:1; transform:translateY(0)} }
.hero-eyebrow { font-size:.75rem; letter-spacing:4px; text-transform:uppercase; color:#e8b4bf; margin-bottom:24px; display:flex; align-items:center; gap:12px }
.hero-eyebrow::before { content:''; width:28px; height:1px; background:#e8b4bf }
.hero h1 { font-size:clamp(3rem, 7vw, 5rem); color:#fff; margin-bottom:26px }
.hero h1 em { font-style:italic; color:#f5c8d0 }
.btn-main { display:inline-block; padding:18px 45px; background: var(--accent); color:#fff; text-decoration:none; border-radius:50px; font-size:.9rem; font-weight:500; transition:all .3s; border:none; cursor:pointer }
.btn-main:hover { background:#a85f6d; transform:translateY(-2px); box-shadow:0 12px 30px rgba(107,39,55,0.4) }

/* БЛОКИ С ВИДЕО ВМЕСТО КАРТИНКИ */
.video-blob-wrap { 
    width:100%; 
    padding-bottom:100%; 
    position:relative; 
    border-radius:55% 45% 60% 40% / 50% 55% 45% 50%; 
    overflow:hidden; 
    background:#f5dde3;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}
.video-blob-wrap iframe { 
    position:absolute; 
    top:0; left:0; width:100%; height:100%; 
    border:none;
}

.section { padding:100px 0; }
.wrap { max-width:1200px; margin:0 auto; padding:0 40px }
.eyebrow { font-size:.75rem; letter-spacing:3px; text-transform:uppercase; color: var(--accent); font-weight:600; margin-bottom:16px; display:block }
.sec-title { font-size:clamp(2.2rem, 4vw, 3.5rem); margin-bottom:25px; color: var(--text-dark) }

/* ABOUT GRID */
.about-grid { display:grid; grid-template-columns: 1fr 1fr; gap:60px; align-items:center }
.about-text p { color: var(--text-muted); font-size:1rem; margin-bottom:20px }

/* STATS */
.stats-row { display:flex; gap:15px; margin-top:30px; flex-wrap:wrap }
.stat-box { padding:15px; border-radius:20px; text-align:center; flex:1; min-width:120px }
.stat-box.pink { background: var(--accent); color:#fff }
.stat-box.white { background:#fff; border:1px solid #f5dde3 }
.stat-num { font-family:'Cormorant Garamond',serif; font-size:2rem; display:block }
.stat-lbl { font-size:.7rem; opacity:0.8; line-height:1.2 }

/* REVEAL ANIMATION */
.reveal { opacity:0; transform:translateY(30px); transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1) }
.reveal.on { opacity:1; transform:translateY(0) }

@media(max-width:960px){
  nav { padding:15px 25px }
  .nav-links { display:none }
  .about-grid { grid-template-columns: 1fr; gap:40px }
  .hero-content { padding:0 25px }
}
</style>
